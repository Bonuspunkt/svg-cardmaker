<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280" width="200" height="280">
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c0c0c0"/>
      <stop offset="100%" stop-color="#888"/>
    </linearGradient>
    <linearGradient id="screen-glare" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.3)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- Main body - the iconic taco shape -->
  <rect x="35" y="20" width="130" height="240" rx="18" ry="18"
        fill="url(#body)" stroke="#444" stroke-width="2.5"/>

  <!-- Inner bezel -->
  <rect x="42" y="26" width="116" height="228" rx="14" ry="14"
        fill="#555" stroke="#333" stroke-width="1"/>

  <!-- Screen area -->
  <rect x="52" y="40" width="96" height="72" rx="4" ry="4"
        fill="#1a3a1a" stroke="#222" stroke-width="1.5"/>
  <!-- Screen content - a little RPG scene -->
  <rect x="56" y="44" width="88" height="64" rx="2" ry="2" fill="#2a5a2a"/>
  <!-- Ground -->
  <rect x="56" y="90" width="88" height="18" fill="#3a6a2a"/>
  <!-- Little character -->
  <rect x="72" y="76" width="8" height="14" fill="#dda" stroke="#554" stroke-width="0.5"/>
  <rect x="74" y="70" width="4" height="6" rx="1" fill="#eeb" stroke="#554" stroke-width="0.5"/>
  <!-- Sword in hand -->
  <line x1="80" y1="80" x2="88" y2="72" stroke="#ccc" stroke-width="1.5"/>
  <line x1="87" y1="73" x2="90" y2="70" stroke="#fff" stroke-width="1"/>
  <!-- Enemy blob -->
  <ellipse cx="110" cy="84" rx="8" ry="10" fill="#a33" stroke="#622" stroke-width="0.5"/>
  <circle cx="108" cy="81" r="1.2" fill="#faa"/>
  <circle cx="113" cy="81" r="1.2" fill="#faa"/>
  <!-- HP bar -->
  <rect x="58" y="46" width="30" height="4" rx="1" fill="#400"/>
  <rect x="58" y="46" width="22" height="4" rx="1" fill="#0a0"/>
  <!-- Screen glare -->
  <rect x="52" y="40" width="96" height="72" rx="4" ry="4"
        fill="url(#screen-glare)"/>

  <!-- D-pad area (left side, portrait orientation) -->
  <g transform="translate(72, 135)">
    <!-- D-pad base -->
    <rect x="-12" y="-4" width="24" height="8" rx="1.5" fill="#333" stroke="#222" stroke-width="0.8"/>
    <rect x="-4" y="-12" width="8" height="24" rx="1.5" fill="#333" stroke="#222" stroke-width="0.8"/>
    <circle cx="0" cy="0" r="3" fill="#2a2a2a"/>
  </g>

  <!-- Action buttons (right side) -->
  <g transform="translate(128, 135)">
    <circle cx="-8" cy="-8" r="5" fill="#444" stroke="#333" stroke-width="0.8"/>
    <circle cx="8" cy="-8" r="5" fill="#444" stroke="#333" stroke-width="0.8"/>
    <circle cx="-8" cy="8" r="5" fill="#444" stroke="#333" stroke-width="0.8"/>
    <circle cx="8" cy="8" r="5" fill="#444" stroke="#333" stroke-width="0.8"/>
  </g>

  <!-- Number keypad -->
  <g transform="translate(65, 170)">
    <!-- Row 1 -->
    <rect x="0" y="0" width="20" height="12" rx="2" fill="#3a3a3a" stroke="#2a2a2a" stroke-width="0.5"/>
    <text x="10" y="9" text-anchor="middle" fill="#aaa" font-size="7" font-family="Arial">1</text>
    <rect x="24" y="0" width="20" height="12" rx="2" fill="#3a3a3a" stroke="#2a2a2a" stroke-width="0.5"/>
    <text x="34" y="9" text-anchor="middle" fill="#aaa" font-size="7" font-family="Arial">2</text>
    <rect x="48" y="0" width="20" height="12" rx="2" fill="#3a3a3a" stroke="#2a2a2a" stroke-width="0.5"/>
    <text x="58" y="9" text-anchor="middle" fill="#aaa" font-size="7" font-family="Arial">3</text>
    <!-- Row 2 -->
    <rect x="0" y="16" width="20" height="12" rx="2" fill="#3a3a3a" stroke="#2a2a2a" stroke-width="0.5"/>
    <text x="10" y="25" text-anchor="middle" fill="#aaa" font-size="7" font-family="Arial">4</text>
    <rect x="24" y="16" width="20" height="12" rx="2" fill="#3a3a3a" stroke="#2a2a2a" stroke-width="0.5"/>
    <text x="34" y="25" text-anchor="middle" fill="#aaa" font-size="7" font-family="Arial">5</text>
    <rect x="48" y="16" width="20" height="12" rx="2" fill="#3a3a3a" stroke="#2a2a2a" stroke-width="0.5"/>
    <text x="58" y="25" text-anchor="middle" fill="#aaa" font-size="7" font-family="Arial">6</text>
    <!-- Row 3 -->
    <rect x="0" y="32" width="20" height="12" rx="2" fill="#3a3a3a" stroke="#2a2a2a" stroke-width="0.5"/>
    <text x="10" y="41" text-anchor="middle" fill="#aaa" font-size="7" font-family="Arial">7</text>
    <rect x="24" y="32" width="20" height="12" rx="2" fill="#3a3a3a" stroke="#2a2a2a" stroke-width="0.5"/>
    <text x="34" y="41" text-anchor="middle" fill="#aaa" font-size="7" font-family="Arial">8</text>
    <rect x="48" y="32" width="20" height="12" rx="2" fill="#3a3a3a" stroke="#2a2a2a" stroke-width="0.5"/>
    <text x="58" y="41" text-anchor="middle" fill="#aaa" font-size="7" font-family="Arial">9</text>
    <!-- Row 4 -->
    <rect x="0" y="48" width="20" height="12" rx="2" fill="#3a3a3a" stroke="#2a2a2a" stroke-width="0.5"/>
    <text x="10" y="57" text-anchor="middle" fill="#aaa" font-size="7" font-family="Arial">*</text>
    <rect x="24" y="48" width="20" height="12" rx="2" fill="#3a3a3a" stroke="#2a2a2a" stroke-width="0.5"/>
    <text x="34" y="57" text-anchor="middle" fill="#aaa" font-size="7" font-family="Arial">0</text>
    <rect x="48" y="48" width="20" height="12" rx="2" fill="#3a3a3a" stroke="#2a2a2a" stroke-width="0.5"/>
    <text x="58" y="57" text-anchor="middle" fill="#aaa" font-size="7" font-family="Arial">#</text>
  </g>

  <!-- Menu/select buttons between screen and d-pad -->
  <rect x="70" y="118" width="16" height="6" rx="2" fill="#444" stroke="#333" stroke-width="0.5"/>
  <rect x="114" y="118" width="16" height="6" rx="2" fill="#444" stroke="#333" stroke-width="0.5"/>

  <!-- Speaker grille (top) -->
  <g transform="translate(85, 30)">
    <line x1="0" y1="0" x2="30" y2="0" stroke="#666" stroke-width="0.8"/>
    <line x1="0" y1="3" x2="30" y2="3" stroke="#666" stroke-width="0.8"/>
    <line x1="0" y1="6" x2="30" y2="6" stroke="#666" stroke-width="0.8"/>
  </g>

  <!-- N-Gage branding -->
  <text x="100" y="255" text-anchor="middle" fill="#999" font-size="9"
        font-family="Arial, sans-serif" font-weight="bold" letter-spacing="2">N-GAGE</text>

  <!-- Side taco lip hint (left side) -->
  <path d="M35 60 Q28 140 35 220" fill="none" stroke="#777" stroke-width="1.5"/>
  <!-- Side taco lip hint (right side) -->
  <path d="M165 60 Q172 140 165 220" fill="none" stroke="#999" stroke-width="1.5"/>
</svg>
